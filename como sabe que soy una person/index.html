<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Cómo sabe que soy una person?</title>
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main-container">
        <div class="title-overlay">
            <h1>¿Cómo sabe que soy una person?</h1>
        </div>

        <div class="loading-overlay" id="loading">
            <div class="loading-title">¿Cómo sabe que soy una person?</div>
            <div class="loading-spinner"></div>
            <div class="loading-text">Esperando permiso de cámara...</div>
        </div>

        <div id="error-container" style="display: none;"></div>

        <div class="video-container hidden" id="video-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>

        <div class="detection-info hidden" id="detection-info">
            <div class="detection-count" id="detection-count">
                Detectando objetos...
            </div>
            <div class="detection-list" id="detection-list">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
